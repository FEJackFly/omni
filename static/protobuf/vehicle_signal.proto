syntax = "proto3";
package trunk.msgs.v2;

import "geometry.proto";

message VehicleSignal {
  Header header = 1;
  // AGV基本信息
  uint32 agv_id = 2;                        // AGV标识号
  uint32 agv_type = 3;                      // AGV类型
  uint32 vs_software_version = 4;           // 车辆软件版本
  float axle_ratio = 5;                     // 轴速比 [22-26] 分辨率: 0.01
  uint32 odometer = 6;                      // 里程表 单位: Km 分辨率: 1 km

  // 模式状态
  uint32 alert_mode = 7;                    // 警报模式
  uint32 control_mode = 8;                  // 控制模式
  uint32 ns_mode = 9;                       // NS模式
  uint32 vs_power_mode = 10;                // 车辆电源模式

  // 驱动限制参数
  float max_driving_speed_limit = 11;             // 最大行驶速度限制 单位: m/s 分辨率: 1 cm/s
  uint32 max_driving_motor_torque_limit = 12;     // 最大驱动电机扭矩限制 单位: Nm 分辨率: 1 Nm
  uint32 max_mechanical_brake_torque_limit = 13;  // 最大机械制动扭矩限制 单位: Nm 分辨率: 1 Nm
  uint32 max_regen_motor_brake_torque_limit = 14; // 最大再生制动扭矩限制 单位: Nm 分辨率: 1 Nm

  // 驱动系统参数
  float wheel_drive_torque_setpoint = 15;   // 车轮驱动扭矩设定值 单位: Nm 分辨率: 10 Nm
  float ns_speed_actual = 16;               // NS实际速度 单位: m/s 分辨率: 1 cm/s
  float vs_speed_actual = 17;               // 车辆实际速度 单位: m/s 分辨率: 1 cm/s

  // 转向系统参数
  float steering_setpoint_front_1 = 18;     // 前轴1转向设定值 单位: degrees 分辨率: 0.1°
  float steering_setpoint_front_2 = 19;     // 前轴2转向设定值 单位: degrees 分辨率: 0.1°
  float steering_setpoint_rear_3 = 20;      // 后轴3转向设定值 单位: degrees 分辨率: 0.1°
  float steering_setpoint_rear_4 = 21;      // 后轴4转向设定值 单位: degrees 分辨率: 0.1°
  uint32 ns_estimated_wheel_diameter = 22;  // NS估计车轮直径 单位: mm 分辨率: 1 mm

  // 前驱动系统
  float front_drive_torque_setpoint = 23;      // 前驱动扭矩设定值 单位: Nm 分辨率: 100 Nm
  float front_drive_torque_actual = 24;        // 前驱动实际扭矩 单位: Nm 分辨率: 100 Nm
  int32 front_drive_speed_setpoint = 25;       // 前驱动速度设定值 单位: RPM 分辨率: 1 RPM
  int32 front_drive_speed_actual = 26;         // 前驱动实际速度 单位: RPM 分辨率: 1 RPM
  int32 front_drive_inverter_temperature = 27; // 前驱动逆变器温度 单位: oC 分辨率: 1 oC
  int32 front_drive_motor_temperature = 28;    // 前驱动电机温度 单位: oC 分辨率: 1 oC
  float front_drive_coolant_pressure = 29;     // 前驱动冷却液压力 单位: BAR 分辨率: 0.1 BAR
  int32 front_drive_f_motor_bearing_temperature = 30; // 前驱动电机前轴承温度 单位: oC 分辨率: 1 oC
  int32 front_drive_b_motor_bearing_temperature = 31; // 前驱动电机后轴承温度 单位: oC 分辨率: 1 oC

  // 后驱动系统
  float rear_drive_torque_setpoint = 32;      // 后驱动扭矩设定值 单位: Nm 分辨率: 100 Nm
  float rear_drive_torque_actual = 33;        // 后驱动实际扭矩 单位: Nm 分辨率: 100 Nm
  int32 rear_drive_speed_setpoint = 34;       // 后驱动速度设定值 单位: RPM 分辨率: 1 RPM
  int32 rear_drive_speed_actual = 35;         // 后驱动实际速度 单位: RPM 分辨率: 1 RPM
  int32 rear_drive_inverter_temperature = 36; // 后驱动逆变器温度 单位: oC 分辨率: 1 oC
  int32 rear_drive_motor_temperature = 37;    // 后驱动电机温度 单位: oC 分辨率: 1 oC
  float rear_drive_coolant_pressure = 38;     // 后驱动冷却液压力 单位: BAR 分辨率: 0.1 BAR
  int32 rear_drive_f_motor_bearing_temperature = 39; // 后驱动电机前轴承温度 单位: oC 分辨率: 1 oC
  int32 rear_drive_b_motor_bearing_temperature = 40; // 后驱动电机后轴承温度 单位: oC 分辨率: 1 oC

  // 液压系统
  int32 hydraulic_motor_speed_setpoint = 41;       // 液压电机速度设定值 单位: RPM 分辨率: 1 RPM
  int32 hydraulic_motor_speed_actual = 42;         // 液压电机实际速度 单位: RPM 分辨率: 1 RPM
  int32 hydraulic_motor_inverter_temperature = 43; // 液压电机逆变器温度 单位: oC 分辨率: 1 oC
  int32 hydraulic_motor_temperature = 44;          // 液压电机温度 单位: oC 分辨率: 1 oC
  float hydraulic_drive_coolant_pressure = 45;     // 液压驱动冷却液压力 单位: BAR 分辨率: 0.1 BAR
  float hydraulic_system_pressure = 46;            // 液压系统压力 单位: BAR 分辨率: 0.1 BAR
  int32 hydraulic_oil_temperature = 47;            // 液压油温度 单位: oC 分辨率: 1 oC
  int32 hydraulic_oil_level = 48;                  // 液压油液位 单位: %

  // 制动系统
  float brake_front_pressure_actual = 49;   // 前制动实际压力 单位: BAR 分辨率: 0.1 BAR
  float brake_front_torque_setpoint = 50;   // 前制动扭矩设定值 单位: Nm 分辨率: 100 Nm
  float brake_front_torque_actual = 51;     // 前制动实际扭矩 单位: Nm 分辨率: 100 Nm
  float brake_rear_pressure_actual = 52;    // 后制动实际压力 单位: BAR 分辨率: 0.1 BAR
  float brake_rear_torque_setpoint = 53;    // 后制动扭矩设定值 单位: Nm 分辨率: 100 Nm
  float brake_rear_torque_actual = 54;      // 后制动实际扭矩 单位: Nm 分辨率: 100 Nm
  bool mechanical_brake_on = 55;            // 机械制动开启状态
  bool parking_brake_on = 56;               // 驻车制动开启状态

  // 详细转向参数（左右轮分开）
  float steering_setpoint_front_left_1 = 57; // 左前轮1转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_front_left_1 = 58;   // 左前轮1实际转向角度 单位: degrees 分辨率: 0.1°
  float steering_setpoint_front_left_2 = 59; // 左前轮2转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_front_left_2 = 60;   // 左前轮2实际转向角度 单位: degrees 分辨率: 0.1°
  float steering_setpoint_rear_left_3 = 61;  // 左后轮3转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_rear_left_3 = 62;    // 左后轮3实际转向角度 单位: degrees 分辨率: 0.1°
  float steering_setpoint_rear_left_4 = 63;  // 左后轮4转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_rear_left_4 = 64;    // 左后轮4实际转向角度 单位: degrees 分辨率: 0.1°

  float steering_setpoint_front_right_1 = 65; // 右前轮1转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_front_right_1 = 66;   // 右前轮1实际转向角度 单位: degrees 分辨率: 0.1°
  float steering_setpoint_front_right_2 = 67; // 右前轮2转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_front_right_2 = 68;   // 右前轮2实际转向角度 单位: degrees 分辨率: 0.1°
  float steering_setpoint_rear_right_3 = 69;  // 右后轮3转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_rear_right_3 = 70;    // 右后轮3实际转向角度 单位: degrees 分辨率: 0.1°
  float steering_setpoint_rear_right_4 = 71;  // 右后轮4转向设定值 单位: degrees 分辨率: 0.1°
  float steering_actual_rear_right_4 = 72;    // 右后轮4实际转向角度 单位: degrees 分辨率: 0.1°

  // 轮编码器计数
  uint32 wheel_encoder_front_left_1_count = 73;  // 左前轮1编码器计数
  uint32 wheel_encoder_front_left_2_count = 74;  // 左前轮2编码器计数
  uint32 wheel_encoder_rear_left_3_count = 75;   // 左后轮3编码器计数
  uint32 wheel_encoder_rear_left_4_count = 76;   // 左后轮4编码器计数
  uint32 wheel_encoder_front_right_1_count = 77; // 右前轮1编码器计数
  uint32 wheel_encoder_front_right_2_count = 78; // 右前轮2编码器计数
  uint32 wheel_encoder_rear_right_3_count = 79;  // 右后轮3编码器计数
  uint32 wheel_encoder_rear_right_4_count = 80;  // 右后轮4编码器计数

  // 轮胎压力和温度
  float tyre_pressure_front_left_1 = 81;   // 左前轮1胎压 单位: BAR 分辨率: 0.1 BAR
  float tyre_pressure_front_left_2 = 82;   // 左前轮2胎压 单位: BAR 分辨率: 0.1 BAR
  float tyre_pressure_rear_left_3 = 83;    // 左后轮3胎压 单位: BAR 分辨率: 0.1 BAR
  float tyre_pressure_rear_left_4 = 84;    // 左后轮4胎压 单位: BAR 分辨率: 0.1 BAR
  float tyre_pressure_front_right_1 = 85;  // 右前轮1胎压 单位: BAR 分辨率: 0.1 BAR
  float tyre_pressure_front_right_2 = 86;  // 右前轮2胎压 单位: BAR 分辨率: 0.1 BAR
  float tyre_pressure_rear_right_3 = 87;   // 右后轮3胎压 单位: BAR 分辨率: 0.1 BAR
  float tyre_pressure_rear_right_4 = 88;   // 右后轮4胎压 单位: BAR 分辨率: 0.1 BAR

  int32 tyre_temperature_front_left_1 = 89;   // 左前轮1轮胎温度 单位: oC 分辨率: 1 oC
  int32 tyre_temperature_front_left_2 = 90;   // 左前轮2轮胎温度 单位: oC 分辨率: 1 oC
  int32 tyre_temperature_rear_left_3 = 91;    // 左后轮3轮胎温度 单位: oC 分辨率: 1 oC
  int32 tyre_temperature_rear_left_4 = 92;    // 左后轮4轮胎温度 单位: oC 分辨率: 1 oC

  // 集装箱重量
  uint32 container_weight_front = 93;         // 前部集装箱重量 单位: kg 分辨率: 500 kg
  uint32 container_weight_rear = 94;          // 后部集装箱重量 单位: kg 分辨率: 500 kg
  uint32 container_weight_centre = 95;        // 中部集装箱重量 单位: kg 分辨率: 500 kg

  // 高压电池系统
  uint32 hv_battery_pack_id = 96;             // 高压电池包ID
  uint32 hv_battery_designed_capacity = 97;   // 高压电池设计容量 单位: kWh 分辨率: 1 kWh
  uint32 hv_battery_current_capacity = 98;    // 高压电池当前容量 单位: kWh 分辨率: 1 kWh
  float hv_battery_state_of_health = 99;      // 高压电池健康状态 单位: % 分辨率: 0.50%
  float hv_battery_state_of_charge = 100;     // 高压电池充电状态 单位: % 分辨率: 0.50%
  float hv_battery_soc_upper_charge_limit = 101;   // 高压电池SOC充电上限 单位: % 分辨率: 0.50%
  float hv_battery_soc_low_limit = 102;            // 高压电池SOC低限 单位: % 分辨率: 0.50%
  float hv_battery_soc_too_low_limit = 103;        // 高压电池SOC过低限 单位: % 分辨率: 0.50%
  uint32 hv_battery_total_battery_strings = 104;   // 高压电池总电池串数
  uint32 hv_battery_no_of_connected_strings = 105; // 高压电池连接电池串数
  uint32 hv_battery_cumulative_battery_energy_counter = 106; // 高压电池累计能量计数 单位: kWh 分辨率: 1kWh
  uint32 hv_battery_cumulative_charging_counter = 107;       // 高压电池累计充电计数 分辨率: 1
  uint32 hv_battery_bms_version_number = 108;  // 高压电池BMS版本号
  uint32 hv_battery_bms_mode = 109;            // 高压电池BMS模式
  uint32 hv_battery_system_status = 110;  // 高压电池系统状态
  uint32 hv_battery_string_status = 111;  // 高压电池串状态
  uint32 hv_battery_insulation_resistance = 112;  // 高压电池绝缘电阻 单位: K Ohm 分辨率: 8 Kohm
  float hv_battery_voltage = 113;   // 高压电池电压 单位: V 分辨率: 0.1V
  float hv_battery_current = 114;   // 高压电池电流 单位: A 分辨率: 0.1A
  float hv_battery_max_discharge_current = 115;     // 高压电池最大放电电流 单位: A 分辨率: 0.1A
  float hv_battery_max_regenerative_current = 116;  // 高压电池最大再生电流 单位: A 分辨率: 0.1A
  float hv_battery_string_1_voltage = 117;   // 高压电池串1电压 单位: V 分辨率: 0.1V
  float hv_battery_string_2_voltage = 118;   // 高压电池串2电压 单位: V 分辨率: 0.1V
  float hv_battery_string_3_voltage = 119;   // 高压电池串3电压 单位: V 分辨率: 0.1V
  float hv_battery_string_4_voltage = 120;   // 高压电池串4电压 单位: V 分辨率: 0.1V
  uint32 hv_battery_max_cell_voltage = 121;  // 高压电池最大单体电压 单位: mV 分辨率: 1 mV
  uint32 hv_battery_min_cell_voltage = 122;  // 高压电池最小单体电压 单位: mV 分辨率: 1 mV
  uint32 hv_battery_max_cell_voltage_address = 123; // 高压电池最大单体电压地址
  uint32 hv_battery_min_cell_voltage_address = 124; // 高压电池最小单体电压地址
  int32 hv_battery_max_cell_temp = 125;      // 高压电池最高单体温度 单位: oC 分辨率: 1oC
  int32 hv_battery_min_cell_temp = 126;      // 高压电池最低单体温度 单位: oC 分辨率: 1oC
  uint32 hv_battery_max_cell_temp_address = 127; // 高压电池最高单体温度地址
  uint32 hv_battery_min_cell_temp_address = 128; // 高压电池最低单体温度地址
  float hv_battery_max_charging_voltage = 129; // 高压电池最大充电电压 单位: V 分辨率: 0.1V
  float hv_battery_max_charging_current = 130; // 高压电池最大充电电流 单位: A 分辨率: 0.1A
  float hv_battery_charging_voltage_setpoint = 131; // 高压电池充电电压设定值 单位: V 分辨率: 0.1V
  float hv_battery_charging_current_setpoint = 132; // 高压电池充电电流设定值 单位: A 分辨率: 0.1A
  bool hv_battery_stop_charging = 133;        // 高压电池停止充电
  bool hv_battery_imd_disabled = 134;         // 高压电池IMD禁用
  bool hv_battery_shutdown_request = 135;     // 高压电池关机请求

  // 充电系统
  uint32 evse_proximity_state = 136;         // 充电桩接近状态
  uint32 evse_cp_state = 137;                // 充电桩CP状态
  uint32 evse_prog_state = 138;              // 充电桩程序状态
  uint32 evse_status_code = 139;             // 充电桩状态代码
  uint32 evse_isolation_status = 140;        // 充电桩绝缘状态
  float evse_present_voltage = 141;          // 充电桩当前电压 单位: V 分辨率: 0.1V
  float evse_present_current = 142;          // 充电桩当前电流 单位: A 分辨率: 0.1A
  bool ev_ready = 143;                       // 电动车就绪状态
  bool ev_ready_to_charge_state = 144;       // 电动车准备充电状态
  uint32 ev_controller_prog_state = 145;     // 电动车控制器程序状态
  uint32 ev_error_code = 146;                // 电动车错误代码
  uint32 evcc_error_code = 147;              // 电动车通信控制器错误代码
  float ev_measured_charging_voltage = 148;  // 电动车测量充电电压 单位: V 分辨率: 0.1V
  float ev_target_voltage_limit = 149;       // 电动车目标电压限制 单位: V 分辨率: 0.1V
  float ev_target_current_limit = 150;       // 电动车目标电流限制 单位: A 分辨率: 0.1A
  float ev_battery_soc_level = 151;          // 电动车电池SOC水平 单位: % 分辨率: 0.50%
}