syntax = "proto3";
package trunk.proto.fit;
import "trunk/proto/common/geometry.proto";

message TrafficLightInfo{
  enum Type{
    STRAIGHT = 0;  // 直行
    LEFT_TURN = 1;  // 左转
    RIGHT_TURN = 2;  // 右转
  }
  enum Color{
    RED = 0;
    GREEN = 1;
  }
  string id = 1;
  common.Point3D point = 2;
  Type type = 3;
  Color color = 4;
}
