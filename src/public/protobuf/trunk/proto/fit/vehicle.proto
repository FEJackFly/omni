syntax = "proto3";
package trunk.proto.fit;

import "trunk/proto/data/frame.proto";
import "trunk/proto/fit/speed_table.proto";
import "trunk/proto/fit/enums.proto";

message Vehicle {
  data.Frame frame = 1;
  SpeedTable speed_table = 2; // 由 fit-backend 填充
  SourceType source_type = 3;
  // host及port用于TPA上传给FMS
  string ip = 4;
  string port = 5;
}
