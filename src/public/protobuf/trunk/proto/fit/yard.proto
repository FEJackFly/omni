syntax = "proto3";
package trunk.proto.fit;

import "google/protobuf/timestamp.proto";


message Yard {
  google.protobuf.Timestamp timestamps = 1;  //  创建时间
  string id = 2;
  string name = 3;
  repeated OccupancyInfo occupancy_info = 4; // 当前车辆占用
}


message OccupancyInfo {
  string che_id = 1;
  string bay = 2;
  string status = 3;
}
