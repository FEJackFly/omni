syntax = "proto3";
package trunk.msgs.v2;

import "common.proto";
import "geometry.proto";

/*****************************************************
 *              通用自动驾驶功能接口                 *
 *****************************************************/

// 途经点 - 用于设置终点
message WayPoints {
  message Point {
    enum Type {
      NOT_SPECIFIED = 0; // 未指定
      UP_DETOUR = 1;     // 上岸桥绕行
      DOWN_DETOUR = 2;   // 下岸桥绕行
      UP_DETOUR_THROUGH_9 = 3;   // 经过9车道上岸桥绕行 
      DOWN_DETOUR_THROUGH_9 = 4; // 经过9车道下岸桥绕行
      UP_DETOUR_THROUGH_8 = 5;   // 经过8车道上岸桥绕行
      DOWN_DETOUR_THROUGH_8 = 6; // 经过8车道下岸桥绕行
      HERRINGBONE = 7;           // 人字形路径
    }
    enum Direction {           // 方向
      DIRECTION_UNKNOWN = 0;   // 默认值
      FORWARD = 1;             // 前进
      BACKWARD = 2;            // 后退
    }
    double x = 1;
    double y = 2;
    Type type = 3;           // 途径点类型
    float heading = 4;       // 航向角
    Direction direction = 5; // 车辆行驶方向
    bool check_heading = 6;  // 是否检查途经点朝向
  }
  string navi_id = 1;                        // 指令id
  string up_vpb = 2;                         // 上岸桥 vpb: Virtual Parallel buffer虚拟并行缓冲区
  string down_vpb = 3;                       // 下岸桥
  uint32 route_direction = 4;                // 上/下岸桥方向 0: 单向岸桥 1: 顺时针 2: 逆时针
  uint32 dest_type = 5;                      // 目的地类型
  repeated Point2D way_points = 6;
  repeated Point way_points_v2 = 7;
  bool need_crane_lane_change = 8;           // 是否开启岸桥下换道(宁波)
  bool keep_last_detour = 9;                 // 是否维持绕行状态(宁波)
  bool filter_end_heading = 10;              // 控制过滤终点heading的开关
  bool extend_junction_waypoint_search_radius = 11;  // 控制是否根据在路口内扩大搜索范围
  bool route_update = 12;                    // 是否路径更新
  uint32 start_driving_direction = 13;       // 起点的driving_direction 1 顺行 2 逆行
}

// 停车模式 - 用于实现车辆急停/缓停
message ParkingMode {
  uint32 id = 1;
  double x = 2;
  double y = 3;
  double yaw = 4;
  uint32 type = 5;                           // 停车类型 0:不停车 1: 缓停(往前行驶15米后停车) 2: 急停 3: 目标点停车(到达目标点后, 缓停)
}

// 相对位置(仅纵向) - 用于实现相对位置调整功能
message RelativePosition {
  uint32 id = 1;                             // id
  double distance = 2;                       // 纵向移动距离
  double precision = 3;                      // 精度要求
}

// 绝对位置 - 用于实现绝对位置调整功能
message AbsolutePosition {
  uint32 id = 1;
  double x = 2;
  double y = 3;
  double yaw = 4;
}

// 电池控制 - 用于控制集卡上下高压
message BatteryControl {
  string truck_id = 1;                       // 集卡id
  uint32 code = 2;                           // 0: 上高压 1: 下高压
}

// 路段限速 - 用于实现区域限速
message SpeedLimit {
  uint32 id = 1;                             // id
  double current_speed_limit = 2;            // 当前限速
  double next_speed_limit = 3;               // 下一个限速
  double distance_to_next_speed_limit = 4;   // 下一个限速点距离
}

// 安全车距 - 用于实现密停场景下停车间距更改
message SafeDistance {
  uint32 id = 1;
  double distance = 2;                       // 安全车距
}

// 车辆控制信息 - 用于实现被动引导功能
message Control {
  double steering_angle_front = 1;                    // 前轮转角 °
  double steering_angle_rear = 2;                     // 后轮转角 °
  double steering_speed_front = 3;                    // 前轮速度 m/s
  double steering_speed_rear = 4;                     // 后轮速度 m/s
  double distance = 5;                       // 距离 m
  double throttle = 6;                       // 油门踏板开度 0.0 ~ 1.0
  double brake = 7;                          // 制动踏板开度 0.0 ~ 1.0
  uint32 gear = 8;                           // 档位 0:P 1:R 2:N 3:D
  uint32 lat_mode = 9;                       // 转向模式设置
  uint32 long_mode = 10;                     // 纵向模式设置
}

// 局部地图 - 用于为自动驾驶提供局部地图
message LocalMap {
  string navi_id = 1;
  double stop_distances = 2;                 // 剩余距离
  repeated Section sections = 3;
}

// 天气 - 用于调整定位和感知的参数
message Weather {
  enum Mode {
    SUNNY = 0;        // 晴天
    LIGHT_RAIN = 1;   // 小雨/雪
    HEAVY_RAIN = 2;   // 大雨/雪
    FOGGY = 3;        // 雾天
  }
  repeated Mode mode = 1;
}

// 禁行区 - 用于地图规划路径时禁止驶入的路段
message ClearArea {
  repeated string ids = 1;                  // 空数组+通行模式: 清空所有禁行区
  uint32 type = 2;                          // 0. lane 1: section 2: road 3: bridge
  uint32 mode = 3;                          // 0: 通行 1: 禁行
}

// 数据记录
message Record {
  bool flag = 1;                            // true: 记录 false: 忽略
}

// guardian复位开关
message ResetSwitch {
  bool flag = 1;
}

// 灯光开关 - 用于控制实现车辆灯光控制
message Light {
  uint32 mode = 1;                          // bit 1: 左转向灯 2: 右转向灯 3: 双闪 4: 刹车灯 5: 前行车灯 6: 后行车灯 7: 近光灯
                                            //     8: 远光灯 9: 前雾灯 10: 后雾灯 11: 挂车雾灯 12: 示廓灯 13: 前照灯 14: 后照灯
                                            //     15: 危险报警顶灯 16: 预留 17: 对位红顶灯 18: 对位蓝顶灯 19: 蓝灯闪烁 20: 蓝灯常亮
}

// 车身附件开关 - 用于实现语音、喇叭和雨刷等车身附件控制
message BcmAppendix {
  uint32 mode = 1;                          // bit 1: 电喇叭 2: 气喇叭 3: 低速雨刷 4: 高速雨刷 5: 玻璃水 6: 倒车提示音 7: 车门1 8: 车门2 9: 车速报警 10: 车辆已到达语音 11: 车辆已锁车语音 12: 雷达下电
}

// 车速级别 - 用于调整pnc的参数
message SpeedLevel {
  uint32 mode = 1;                           // 0: 正常速度 1: 中速 2: 低速
}

// 局部地图路径 - 用于云端路径规划
message Path {
  message Lane {
    string id = 1;
    int32 path_index = 2;
    int32 start_index = 3;
    int32 end_index = 4;
  }
  message Section {
    string id = 1;
    double distance_to_end = 2;
    repeated Lane lanes = 3;
  }
  message Trajectory {
    message CurvePoint {
      double x   = 1;
      double y   = 2;
      double z   = 3;
      double yaw = 4;    // yaw
      double v   = 5;    // 速度
    }
    message BoundaryPoint {
      double x = 1;
      double y = 2;
      double z = 3;
    }
    repeated CurvePoint curve = 1;             // 中心线
    repeated BoundaryPoint left_boundary  = 2; // 左边界
    repeated BoundaryPoint right_boundary = 3; // 右边界
  }
  message Region {
    string name      = 1; // 当前车道语义
    int32 type       = 2; // 当前车道类型
    int32 turn_type  = 3; // 前方N米车道转弯类型
  }
  Header header = 1;
  string navi_id = 2;
  repeated string version = 3;               // 地图文件版本号
  repeated Section sections = 4;
  double remaining_distance = 5;
  repeated Point2D way_points = 6;           // 相关途经点
  Trajectory trajectory = 7;                 // 轨迹点
  Region region = 8;                         // current region
}

// 云端path转local_map - 用于欧亚
message LocalPath {
  message Region {
    string name      = 1; // 当前车道语义
    int32 type       = 2; // 当前车道类型
    int32 turn_type  = 3; // 前方N米车道转弯类型
  }
  message WayPoint {
    double x = 1;
    double y = 2;
  }
  message Trajectory {
    message CurvePoint {
      double x   = 1;
      double y   = 2;
      double z   = 3;
      double yaw = 4;    // yaw
      double v   = 5;    // 速度
    }
    message BoundaryPoint {
      double x = 1;
      double y = 2;
      double z = 3;
    }
    repeated CurvePoint curve = 1;             // 中心线
    repeated BoundaryPoint left_boundary  = 2; // 左边界
    repeated BoundaryPoint right_boundary = 3; // 右边界
  }
  Header header = 1;
  string navi_id = 2;
  repeated string lane_ids = 3;             // 所有的车道id(按照行进顺序排列)
  double remaining_distance = 4;            // 当前车辆距离终点的距离
  Region region = 5;
  repeated WayPoint way_points = 6;
  Trajectory trajectory = 7;                 // 轨迹点
}

// This enum defines the position of containers on the vehicle platform
// affecting vehicle balance and operational capabilities during transport.
enum ContainerVehiclePosition {
  CONTAINER_POSITION_UNSPECIFIED = 0;
  CONTAINER_POSITION_FRONT       = 1;  // 前
  CONTAINER_POSITION_CENTER      = 2;  // 中
  CONTAINER_POSITION_REAR        = 3;  // 后
}

// This message contains information about coning-deconing for a container.
message ContainerConingDeconingInfo {
  bool is_required = 1;  // Whether coning-deconing is required
  enum ConingTypeCode {
    CONING_TYPE_CODE_UNSPECIFIED = 0;  // No coning
    CONING_TYPE_CODE_INNER       = 1;  // Inner coning
    CONING_TYPE_CODE_OUTER       = 2;  // Outer coning
  }
  ConingTypeCode coning_type_code = 2;  // Coning type code
  enum ConeCode {
    CONE_CODE_UNSPECIFIED     = 0;  // N - No coning
    CONE_CODE_TWISTLOCK       = 1;  // T - Twistlock
    CONE_CODE_CONE            = 2;  // C - Cone
    CONE_CODE_MIDLOCK_FORWARD = 3;  // M - Midlock Forward
    CONE_CODE_MIDLOCK_AFTER   = 4;  // M - Midlock After
  }
  ConeCode cone_code = 3;  // Cone code
}

message TruckContainer {
  enum Position {
    FRONT = 0;
    REAR = 1;
  }
  message Container {
    int32 size = 1;                         // 箱子尺寸
    double weight = 2;                      // 箱子重量
    string container_id = 3;                // 箱号
    ContainerVehiclePosition position = 4;  // 箱子位置
    ContainerConingDeconingInfo coning_deconing_info = 5;  // Container coning-deconing info
  }
  repeated Container containers = 1;
  bool enable = 2;                          // 设置PnC是否开启重载逻辑(False:不考虑箱重 True:考虑箱重)
}

enum NSControlMode {
  NS_CONTROL_MODE_UNSPECIFIED = 0;
  NS_CONTROL_MODE_AUTO        = 1;  // Auto, Automatic mode that System can control the vehicle
  NS_CONTROL_MODE_IDLE        = 2;  // Idle, Idle mode where vehicle is in transition to Remote Teleops
  NS_CONTROL_MODE_REMOTE      = 3;  // Remote, Remote mode where vehicle can be control by Remote Teleops
}

message ControlModeCommand {
  NSControlMode control_mode = 1;  // Target NS control mode to set
}

// This enum defines the system operational modes.
enum SystemMode {
  SYSTEM_MODE_UNSPECIFIED = 0;
  SYSTEM_MODE_OP          = 1;  // Operation, under System Auto Operation
  SYSTEM_MODE_TN          = 2;  // Transition, about to be taken over by Human
  SYSTEM_MODE_ST          = 3;  // Stub, under System Manual operation by Stub program only
  SYSTEM_MODE_MA          = 4;  // Manual, under Local-Manual mode
}

message SystemModeCommand {
  SystemMode system_mode = 1;  // Target system mode to set
}

message ModeCommand {
  oneof command {
    ControlModeCommand control_mode_command = 1;
    SystemModeCommand system_mode_command   = 2;
  }
}

// 开关 - 用于设置车辆开关
message Switches {
  enum State {
    OFF = 0;
    ON = 1;
    UNKNOWN = 2;
  }
  State enter_autonomous_driving = 1;         // ON: 进入自动驾驶 OFF/UNKNOWN: 无效操作
}

// 强行换道 - 用于云端下发强行换道请求
message ForceLaneChange {
  message Target {
    Point2D start_point = 1;                   // 变道起始点
    Point2D end_point = 2;                     // 变道结束点
  }
  string navi_id = 1;                          // 与local_map里的navi_id一致
  repeated Target target = 2;
}

// 吊具避让、防拖拽开关指令
message TaskCraneInfo {
  uint32 crane_cmd = 1;                 // 吊具避让开关指令 default: 0, clear running_state : 1, close crane detection : 2, open crane detection : 3;
  uint32 drag_cmd = 2;                  // 吊具防拖拽开发指令 default: 0, clear running_state : 1, close drag detection : 2, open drag detection : 3;
}

message SensorControl {
  enum DeviceType {
    LIDAR = 0;     // 雷达
    CAMERA = 1;    // 相机
  }
  enum DeviceState {
    OFF = 0;       // 关机
    ON = 1;        // 开机
    SLEEP = 2;     // 休眠
    WAKE = 3;      // 唤醒
  }
  DeviceType device_type = 1;        // 传感器类型
  DeviceState device_state = 2;      // 设备状态
}

// 清除底盘故障指令
message ClearChassisErr {
  bool reset_cmd = 1;
}

// 锁站按钮状态
message LockStationBcm {
  uint32 cmd = 1;                    // 0:获取 1:重置
  repeated uint32 status = 2;        // 按钮状态集合(bit0位表示左前 bit1位表示右前 bit2位表示左后 bit3位表示右后)
}

// 
message LockStationRegion {
  message Region {
    uint32 type = 1;                 // 0:default, 1:lock_station
    repeated Point3D pts = 2;
  }
  repeated Region regions = 1;
}

message Reply {
  int32 code = 1;                            // 状态码
  string msg = 2;                            // 消息描述
}

message TrafficLight {
  uint32 color = 1;                              // 信号灯颜色 0: unknown 1: 红 2: 黄 3: 绿 4: 黑(未亮起)
  uint32 shape_type = 2;                         // 信号灯形状 0: unknown 1: 水平 2: 垂直 3: 其它
  uint32 blink = 3;                              // 闪烁状态 0: 闪烁中 1: 未闪烁 3: unknown
  uint32 turn_type = 4;                          // 转向类型 0: unknown 1: 左转 2: 右转 3: 直行 4: 掉头 5: 左/直行 6: 右/直行 7: 左/掉头 8: 左/右/直行
  uint32 count_down = 5;                         // 倒计时(s)
  uint32 id = 6;
  uint32 tracking_time = 7;
  float confidence = 8;
  repeated float debug_info = 9;
  repeated Point3D boundary = 10;
}


message BypassCommand {
  message BypassItem {
    int32 error_code = 1;               // 旁路错误码
    bool activate = 2;                  // 是否生效
    float speed_limit = 3;              // 限速 m/s
  }
  repeated BypassItem bypasses = 1;
}

message FaultResetCommand {
  int32 error_code = 1;                 // 错误码重置
}

service AdsCommandService {
  rpc SetWayPoints(WayPoints) returns (Reply);
  rpc Park(ParkingMode) returns (Reply);
  rpc SetRelativePosition(RelativePosition) returns (Reply);
  rpc SetAbsolutePosition(AbsolutePosition) returns (Reply);
  rpc SetBatteryControl(BatteryControl) returns (Reply);
  rpc SetSpeedLimit(SpeedLimit) returns (Reply);
  rpc SetSafeDistance(SafeDistance) returns (Reply);
  rpc ResetLocalization(PoseStamped) returns (Reply);
  rpc PassiveGuide(Control) returns (Reply);
  rpc SetLocalMap(LocalMap) returns (Reply);
  rpc SetWeather(Weather) returns (Reply);
  rpc SetClearArea(ClearArea) returns (Reply);
  rpc TriggerRecord(Record) returns (Reply);
  rpc ResetGuardian(ResetSwitch) returns (Reply);
}
