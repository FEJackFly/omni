syntax = "proto3";

package trunk.msgs;

import "context.proto";
import "status.proto";
import "health.proto";

message DataBox {
    uint32 type = 1; // 1: context, 2: status, 3:health
    Context context = 2; // from trunk shift actor
    Status status = 3;   // from trunk bridge stage
    health.Health health = 4; // from trunk shift actor
}
