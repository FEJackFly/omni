syntax = "proto3";
package trunk.msgs.v2;

/*****************************************************
 *              通用自动驾驶数据版本查询接口              *
 *****************************************************/

message Ver {
  string version = 1;             // 整体版本
  string map_version_json = 2;    // 地图json版本
  string map_version_pcd = 3;     // 地图pcd版本
}